run:
  name: in100_reg_local_sae_batchtopk_k16
  seed: 0
  out_dir: outputs/local_sae/in100_reg_batchtopk_k16

tokens:
  cache_dir: outputs/in100_dinov2b_reg_tokens_10k/tokens

sae:
  variant: batchtopk
  d_model: 768
  d_sae: 32768
  target_k: 16
  decoder_row_norm: true
  matryoshka_prefixes: []
  matryoshka_weights: []

train:
  backend: torch_dense
  device: auto
  precision: bf16
  batch_size: 2048
  epochs: 2
  lr: 0.0003
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.95
  grad_clip_norm: 1.0
  val_fraction: 0.1
  split_seed: 0
  num_workers: 8
  compile: false

